[paths]
# Keep legacy single-root config working:
input_dir = "input"

# For multiple input roots, prefer input_dirs. The CLI also supports repeated
# --input arguments. When multiple roots are configured, converted files are
# written under output/raw/<input-root-label>/... to avoid filename collisions.
# input_dirs = [
#   "input",
#   "input_extra",
# ]
output_dir = "output/raw"
work_dir = ".lmit_work"
report_dir = "output/reports"
session_dir = "sessions"

[scan]
recursive = true
supported_exts = [
  ".md",
  ".markdown",
  ".txt",
  ".pdf",
  ".docx",
  ".pptx",
  ".xlsx",
  ".xls",
  ".html",
  ".htm",
  ".csv",
  ".json",
  ".xml",
  ".jpg",
  ".jpeg",
  ".png",
]
exclude_globs = [
  ".git/**",
  ".venv/**",
  "output/**",
  ".lmit_work/**",
  "sessions/**",
  "__pycache__/**",
  "*.zip",
  "*.7z",
  "*.rar",
  "*.key",
  "*.pem",
  "*.p12",
  "*.pfx",
  "*key*.json",
  "*credential*.json",
  "*secret*",
  "*token*",
  ".env",
]

[conversion]
enable_markitdown_plugins = true
fetch_urls = true
overwrite = false
skip_unchanged = true
blank_note_for_images = true

# When true, convert only manifest records whose previous status was failed
# or retryable partial. Equivalent to passing --retry-failed.
retry_failed = false

[public_fetch]
# Public URLs use the Scrapling-first pipeline when the optional Scrapling
# extra is installed. If Scrapling is missing, public URLs fall back to the
# legacy MarkItDown path.
# Logged-in session sites use the session pipeline instead.
provider = "auto"
enable_scrapling = true
enable_scrapling_dynamic = true
scrapling_cleanup = "ai_targeted"
scrapling_block_ads = true
request_timeout_seconds = 30
navigation_timeout_ms = 45000
min_meaningful_chars = 200
# Optional: use a branded browser for Playwright fallback instead of bundled Chromium.
# browser_channel = "chrome"
#
# Optional: attach public-URL browser fallback to a real browser you launched
# with a CDP port. This can help with sites that treat plain automation traffic
# differently from a normal browser session.
# browser_connect_over_cdp = true
# browser_cdp_port = 9225
# Set provider = "legacy" to roll public URLs back to the older MarkItDown-first flow.

[polling]
enabled = false
interval_seconds = 300
stable_seconds = 10

[output_naming]
# Enrich converted Markdown filenames after content extraction and before wiki ingest.
# Disabled by default to preserve existing output paths.
enrich_filenames = false

# auto = first useful Markdown heading, then first meaningful content line.
# heading = headings only. excerpt = first meaningful content line only.
prefix_source = "auto"
max_prefix_chars = 64
separator = "__"

# Reserved for the future wiki-only split-out project. These sections are kept
# here as placeholders, but they are not part of the supported public release.
[wiki]
root_dir = "knowledge_base"
raw_dir = "knowledge_base/raw"
sources_dir = "knowledge_base/wiki/sources"
topics_dir = "knowledge_base/wiki/topics"
entities_dir = "knowledge_base/wiki/entities"
queries_dir = "knowledge_base/wiki/queries"
schema_dir = "knowledge_base/schema"
log_path = "knowledge_base/wiki/log.md"
index_path = "knowledge_base/wiki/index.md"

[wiki_ingest]
# For local ingestion, this usually points at output/raw. For a wiki-only
# Docker/Unraid deployment, mount one or more already-converted Markdown roots
# and list them here.
source_dirs = [
  "output/raw",
]

[wiki_runtime]
settings_path = "knowledge_base/.wiki_runtime.json"
state_path = "knowledge_base/.wiki_state.json"
auto_sync_on_ingest = false
search_limit = 8
serve_host = "127.0.0.1"
serve_port = 8765

[[sessions]]
name = "facebook"
domains = [
  "facebook.com",
  "www.facebook.com",
  "m.facebook.com",
  "mbasic.facebook.com",
]
login_url = "https://www.facebook.com/login"
state_file = "sessions/facebook_state.json"
headless = true
wait_ms = 8000
navigation_timeout_ms = 90000
retry_count = 2
retry_backoff_ms = 1500

# desktop keeps facebook.com share links closer to their canonical permalink.
# mobile can be useful for simpler page text, but share links may fall back to
# the home feed and accidentally capture unrelated feed ads.
render_mode = "desktop"

[[sessions]]
name = "reddit"
domains = [
  "reddit.com",
  "www.reddit.com",
  "old.reddit.com",
  "new.reddit.com",
]
login_url = "https://www.reddit.com/login/"
state_file = "sessions/reddit_state.json"
headless = true
wait_ms = 8000
navigation_timeout_ms = 90000
retry_count = 2
retry_backoff_ms = 1500
browser_channel = "msedge"
login_use_persistent_context = true
login_persistent_profile_dir = ".lmit_work/browser_profiles/reddit"
login_connect_over_cdp = true
login_cdp_port = 9222
render_mode = "desktop"

[[sessions]]
name = "youtube"
domains = [
  "youtube.com",
  "www.youtube.com",
  "m.youtube.com",
  "youtu.be",
]
login_url = "https://accounts.google.com/ServiceLogin?service=youtube"
state_file = "sessions/youtube_state.json"
headless = true
wait_ms = 8000
navigation_timeout_ms = 90000
retry_count = 2
retry_backoff_ms = 1500
browser_channel = "chrome"
login_use_persistent_context = true
login_persistent_profile_dir = ".lmit_work/browser_profiles/youtube"
login_connect_over_cdp = true
login_cdp_port = 9223
render_mode = "desktop"

[[sessions]]
name = "x"
domains = [
  "x.com",
  "www.x.com",
  "twitter.com",
  "www.twitter.com",
  "mobile.twitter.com",
]
login_url = "https://x.com/i/flow/login"
state_file = "sessions/x_state.json"
headless = true
wait_ms = 8000
navigation_timeout_ms = 90000
retry_count = 2
retry_backoff_ms = 1500
browser_channel = "msedge"
login_use_persistent_context = true
login_persistent_profile_dir = ".lmit_work/browser_profiles/x"
login_connect_over_cdp = true
login_cdp_port = 9224
render_mode = "desktop"
